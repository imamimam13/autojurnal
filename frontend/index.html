<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoJurnal - AI Qualitative Research Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark border-bottom">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-journal-text me-2"></i>AutoJurnal
            </span>
            <span class="badge bg-secondary">v1.0</span>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="card mb-4" id="input-card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <i class="bi bi-search me-2"></i>Research Configuration
                        </h5>

                        <div class="mb-3">
                            <label for="theme" class="form-label">Research Theme / Title</label>
                            <input type="text" class="form-control form-control-lg" id="theme"
                                placeholder="e.g., The Impact of Social Media on Adolescent Mental Health">
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-3">
                                <label for="year-range" class="form-label">Year Range</label>
                                <select class="form-select" id="year-range">
                                    <option value="1">Last 1 year</option>
                                    <option value="2">Last 2 years</option>
                                    <option value="3" selected>Last 3 years</option>
                                    <option value="5">Last 5 years</option>
                                    <option value="10">Last 10 years</option>
                                    <option value="0">All time</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="max-papers" class="form-label">Max Papers</label>
                                <select class="form-select" id="max-papers">
                                    <option value="5">5 papers</option>
                                    <option value="10">10 papers</option>
                                    <option value="15" selected>15 papers</option>
                                    <option value="20">20 papers</option>
                                    <option value="30">30 papers</option>
                                    <option value="50">50 papers</option>
                                    <option value="100">100 papers</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="language" class="form-label">Journal Language</label>
                                <select class="form-select" id="language">
                                    <option value="en">English</option>
                                    <option value="id">Bahasa Indonesia</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="target-length" class="form-label">Target Length</label>
                                <select class="form-select" id="target-length">
                                    <option value="short">Short (~5 pages)</option>
                                    <option value="medium" selected>Medium (~15 pages)</option>
                                    <option value="long">Long (~30 pages)</option>
                                    <option value="extended">Extended (~50 pages)</option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="multi-agent">
                                    <label class="form-check-label" for="multi-agent">Multi-Agent</label>
                                </div>
                            </div>
                        </div>

                        <hr class="border-secondary">
                        <h6 class="mb-3"><i class="bi bi-key me-2"></i>API Keys (disimpan otomatis di browser)</h6>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label for="openalex-api-key" class="form-label">OpenAlex API Key</label>
                                <input type="password" class="form-control" id="openalex-api-key" placeholder="Enter OpenAlex API key">
                            </div>
                            <div class="col-md-4">
                                <label for="provider" class="form-label">LLM Provider</label>
                                <select class="form-select" id="provider">
                                    <option value="ollama">Ollama (Local)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="provider-base-url" class="form-label">Endpoint URL</label>
                                <input type="text" class="form-control" id="provider-base-url" placeholder="http://localhost:11434">
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="provider-model" class="form-label">Model</label>
                                <input type="text" class="form-control" id="provider-model"
                                    placeholder="gemma3:12b (default)">
                            </div>
                            <div class="col-md-6">
                                <label for="llm-api-key" class="form-label">LLM API Key</label>
                                <input type="password" class="form-control" id="llm-api-key" placeholder="Enter API key for selected provider">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex">
                            <button class="btn btn-primary btn-lg flex-fill" id="search-btn" onclick="searchPapers()">
                                <i class="bi bi-search me-2"></i>Search Papers
                            </button>
                            <button class="btn btn-success btn-lg flex-fill" id="generate-btn" onclick="generateJournal()" disabled>
                                <i class="bi bi-journal-text me-2"></i>Generate Journal
                            </button>
                        </div>
                    </div>
                </div>

                <div id="loading-section" style="display:none;">
                    <div class="card mb-4">
                        <div class="card-body text-center py-5">
                            <div class="spinner-border text-primary mb-3" role="status" style="width:3rem;height:3rem;">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <h5 id="loading-text">Searching papers on OpenAlex...</h5>
                            <p class="text-muted mb-0" id="loading-subtext">This may take a moment</p>
                        </div>
                    </div>
                </div>

                <div id="papers-section" style="display:none;">
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-file-text me-2"></i><span id="papers-count">0</span> Papers Found — <span id="selected-count">0</span> selected</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="toggleAllPapers()">
                                <i class="bi bi-check-square me-1"></i>Select All / None
                            </button>
                        </div>
                        <div class="card-body p-0" id="papers-list">
                        </div>
                    </div>
                </div>

                <div id="result-section" style="display:none;">
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <span><i class="bi bi-journal-richtext me-2"></i>Generated Journal</span>
                            <div class="d-flex gap-1 flex-wrap">
                                <button class="btn btn-sm btn-outline-warning" onclick="regenerateJournal()" title="Generate ulang dengan pengaturan sama">
                                    <i class="bi bi-arrow-repeat me-1"></i>Regenerate
                                </button>
                                <button class="btn btn-sm btn-outline-secondary me-1" onclick="copyJournal()">
                                    <i class="bi bi-clipboard me-1"></i>Copy
                                </button>
                                <button class="btn btn-sm btn-outline-info me-1" onclick="copyPlainText()">
                                    <i class="bi bi-file-text me-1"></i>Copy Plain
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="downloadJournal()">
                                    <i class="bi bi-download me-1"></i>Download MD
                                </button>
                            </div>
                        </div>
                        <div class="card-body" id="journal-content">
                        </div>
                        <div class="card-footer text-muted small" id="token-usage" style="display:none">
                        </div>
                    </div>
                </div>

                <div class="toast-container position-fixed bottom-0 end-0 p-3">
                    <div id="toast-msg" class="toast align-items-center text-bg-success border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body" id="toast-body"></div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
